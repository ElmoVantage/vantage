# Vantage — Auto-build and publish a GitHub Release when you push a version tag.
#
# HOW TO RELEASE:
#   1. Bump __version__ in version.py  (e.g. "1.1.0")
#   2. git add version.py && git commit -m "bump version to 1.1.0"
#   3. git tag v1.1.0
#   4. git push origin main --tags
#   → GitHub Actions builds the .exe, zips it, and publishes a new Release.
#   → The download URL never changes:
#       https://github.com/YOU/vantage/releases/latest/download/Vantage-win64.zip

name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"   # triggers on tags like v1.0.0, v1.2.3, etc.

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── 4. Read version from version.py ─────────────────────────────────────
      - name: Read version
        id: version
        shell: python
        run: |
          import os, re
          content = open("version.py").read()
          m = re.search(r'__version__\s*=\s*["\']([^"\']+)["\']', content)
          version = m.group(1) if m else "0.0.0"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={version}\n")
              f.write(f"zip_name=Vantage-v{version}-win64.zip\n")

      # ── 5. Build with PyInstaller ────────────────────────────────────────────
      - name: Build executable
        run: python -m PyInstaller --noconfirm Vantage.spec

      # ── 6. Zip the output ────────────────────────────────────────────────────
      - name: Zip release folder
        run: |
          Compress-Archive -Path dist\Vantage\* `
            -DestinationPath dist\${{ steps.version.outputs.zip_name }} -Force

      # ── 7. Also create a "Vantage-win64.zip" (stable URL for update checker) ─
      - name: Create stable-name zip
        run: |
          Copy-Item dist\${{ steps.version.outputs.zip_name }} dist\Vantage-win64.zip

      # ── 8. Publish GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Vantage v${{ steps.version.outputs.version }}"
          body: |
            ## Vantage v${{ steps.version.outputs.version }}

            ### Install / Update
            1. Download **${{ steps.version.outputs.zip_name }}** below
            2. Extract the zip anywhere (e.g. `C:\Users\YOU\AppData\Local\Vantage\`)
            3. **First install**: copy your `.env` file into the folder, then run `Vantage.exe`
            4. **Updating**: extract over the existing folder (your `.env` and `tracker.db` are preserved)
          files: |
            dist/${{ steps.version.outputs.zip_name }}
            dist/Vantage-win64.zip
          draft: false
          prerelease: false
